        :root {

            --cream: #FFFBF4;

        body {

            padding: 0;
            display: flex;
            justify-content: center;

            min-height: 100vh;
            background-color: var(--cream);

        .card {
            text-align: center;

        }

        .avatar-container {
            width: 320px;
            height: 320px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-circle {
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--orange);
            z-index: 1;
            background: white;
            box-shadow: 0 15px 35px rgba(139, 94, 60, 0.15);
        }

        .bg-circle img {
            object-position: 50% 20%; /* первая цифра — лево/право, вторая — верх/низ */
            width: 115%;
            height: 115%;
            object-fit: cover;
        }

        .front-person {

            top: 16px;    /* увеличь чтобы опустить */
            left: -44px;  /* увеличь чтобы сдвинуть левее */
            position: absolute;
            width: 360px;
            height: 360px;
            z-index: 3;
            pointer-events: none;
        }

        .front-person img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .avatar-container::before {
            content: "";
            position: absolute;
            width: 110%;
            height: 110%;
            background: var(--peach);
            top: -5%;
            left: -5%;
            z-index: 0;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            opacity: 0.6;
            animation: blob 10s infinite linear;
        }

        @keyframes blob {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            50% { border-radius: 60% 40% 30% 70% / 50% 60% 40% 60%; }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            color: var(--accent);

            font-weight: bold;

        .contact-group {

            box-sizing: border-box;

            background-color: var(--orange);

            border: 2px solid var(--orange);
        }

        .btn-wa {
            background-color: transparent;
            border: 2px solid var(--orange);
            color: var(--orange);
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 15px 25px rgba(196, 90, 10, 0.25);
